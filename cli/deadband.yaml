policies:
  - name: "hard_fork_on_repeats"
    when:
      count:
        ExactRepeat: 3
    do:
      type: "InjectPrompt"
      params:
        content: "You've tried this tool 3 times. Try a different approach."
        position: "ReplaceLast"

  - name: "retry_timeout"
    when:
      count:
        ErrorPattern: 1
    do:
      type: "Retry"
      params:
        delay_ms: 100

  - name: "semantic_nudge"
    when:
      any:
        - SemanticRepeat
    do:
      type: "InjectPrompt"
      params:
        content: "You're trying similar approaches. Consider a different strategy."
        position: "BeforeNext"

  - name: "abort_on_budget"
    when:
      count:
        ExactRepeat: 10
    do:
      type: "Abort"
      params:
        reason: "Execution exceeded maximum repeat threshold of 10"

  - name: "backoff_on_rate_limit"
    when:
      count:
        ErrorPattern: 1
    do:
      type: "Backoff"
      params:
        base_ms: 500
